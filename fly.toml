# SynapseCRO on Fly.io — see docs/FLY_DEPLOY.md
#
# Cost-conscious defaults: one always-on 512MB machine (~$5–8/mo on Fly).
# Quick start:
#   fly auth login
#   fly apps create synapsecro
#   fly secrets import < .env
#   fly secrets set CRON_SECRET="$(openssl rand -hex 32)"
#   fly deploy

app = 'synapsecro'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'
  build-secrets = ['SUPABASE_URL', 'SUPABASE_PUBLISHABLE_KEY']

[env]
  PORT = '3000'
  HOSTNAME = '0.0.0.0'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine warm — no cold start for demos (~$5–7/mo).
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '60s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
